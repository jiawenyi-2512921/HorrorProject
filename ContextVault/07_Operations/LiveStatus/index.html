<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SM-13 实时状态</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: #101b2d;
      --panel-2: #162338;
      --text: #edf4ff;
      --muted: #91a3bb;
      --line: #27364d;
      --info: #62a8ff;
      --pass: #5ee0a0;
      --warn: #ffd166;
      --fail: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #132540, var(--bg) 45%);
      color: var(--text);
    }
    main {
      width: min(1100px, calc(100vw - 32px));
      margin: 24px auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 28px; }
    .subtitle { margin-top: 6px; color: var(--muted); }
    .pill {
      border: 1px solid var(--line);
      background: rgba(16, 27, 45, 0.82);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .banner {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      background: linear-gradient(135deg, rgba(98,168,255,.18), rgba(16,27,45,.94));
      box-shadow: 0 20px 60px rgba(0,0,0,.26);
      margin-bottom: 16px;
    }
    .state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--info);
      box-shadow: 0 0 18px var(--info);
    }
    .dot.pass { background: var(--pass); box-shadow: 0 0 18px var(--pass); }
    .dot.warn { background: var(--warn); box-shadow: 0 0 18px var(--warn); }
    .dot.fail { background: var(--fail); box-shadow: 0 0 18px var(--fail); }
    .packet { margin: 14px 0 8px; font-size: 30px; font-weight: 700; }
    .phase { color: var(--muted); font-size: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 16px 0;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(16, 27, 45, 0.86);
      padding: 16px;
    }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .value { font-size: 18px; font-weight: 650; }
    .events { display: grid; gap: 10px; }
    .event {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(22, 35, 56, 0.72);
      display: grid;
      grid-template-columns: 70px 70px 1fr;
      gap: 10px;
      align-items: center;
    }
    .level { font-weight: 700; }
    .level.pass { color: var(--pass); }
    .level.warn { color: var(--warn); }
    .level.fail { color: var(--fail); }
    .level.info { color: var(--info); }
    @media (max-width: 760px) {
      header { display: block; }
      .pill { display: inline-block; margin-top: 12px; }
      .grid { grid-template-columns: 1fr; }
      .event { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>SM-13 Agent 公司实时状态</h1>
        <div class="subtitle">仅限本机 · 只读 · 每 5 秒自动刷新</div>
      </div>
      <div class="pill" id="last-updated">最后更新：加载中</div>
    </header>

    <section class="banner">
      <div class="state"><span id="state-dot" class="dot"></span><span id="state">加载中</span></div>
      <div class="packet" id="packet">正在读取状态...</div>
      <div class="phase" id="phase">等待 status.json</div>
    </section>

    <section class="grid">
      <div class="card"><div class="label">构建</div><div class="value" id="build">未知</div></div>
      <div class="card"><div class="label">专项自动化</div><div class="value" id="focused">未知</div></div>
      <div class="card"><div class="label">完整回归</div><div class="value" id="regression">未知</div></div>
    </section>

    <section class="grid">
      <div class="card" style="grid-column: span 2;"><div class="label">当前摘要</div><div class="value" id="summary">加载中</div></div>
      <div class="card"><div class="label">下次心跳</div><div class="value" id="next-heartbeat">未知</div></div>
    </section>

    <section class="card">
      <div class="label">最近事件</div>
      <div class="events" id="events"></div>
    </section>
  </main>

  <script>
    const stateLabels = {
      working: "工作中",
      validating: "验证中",
      idle: "等待中",
      blocked: "阻塞",
      failed: "失败",
      unknown: "未知"
    };

    const resultLabels = {
      "not-run": "未运行",
      pending: "进行中",
      passed: "通过",
      failed: "失败",
      unknown: "未知"
    };

    const levelLabels = {
      info: "信息",
      pass: "通过",
      warn: "警告",
      fail: "失败"
    };

    const stateClass = (state) => {
      if (["idle"].includes(state)) return "pass";
      if (["blocked"].includes(state)) return "warn";
      if (["failed"].includes(state)) return "fail";
      return "info";
    };

    const levelClass = (level) => {
      if (["info", "pass", "warn", "fail"].includes(level)) return level;
      return "info";
    };

    const setText = (id, value) => {
      document.getElementById(id).textContent = value || "未知";
    };

    const formatState = (state) => stateLabels[state] || state || "未知";
    const formatResult = (result) => resultLabels[result] || result || "未知";
    const formatLevel = (level) => levelLabels[level] || level || "信息";

    const appendEventCell = (row, value, className = "") => {
      const span = document.createElement("span");
      if (className) span.className = className;
      span.textContent = value || "";
      row.appendChild(span);
    };

    async function refreshStatus() {
      try {
        const response = await fetch(`status.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const state = data.state || "unknown";
        const dot = document.getElementById("state-dot");
        dot.className = `dot ${stateClass(state)}`;
        setText("state", formatState(state));
        setText("packet", data.packet);
        setText("phase", data.phase);
        setText("summary", data.summary);
        setText("next-heartbeat", data.nextHeartbeat);
        setText("last-updated", `最后更新：${data.lastUpdated || "未知"}`);
        setText("build", formatResult(data.validation?.build));
        setText("focused", formatResult(data.validation?.focused));
        setText("regression", formatResult(data.validation?.regression));

        const events = document.getElementById("events");
        events.replaceChildren();
        (data.events || []).slice(0, 5).forEach((event) => {
          const row = document.createElement("div");
          row.className = "event";
          const level = levelClass(event.level || "info");
          appendEventCell(row, event.time || "--:--");
          appendEventCell(row, formatLevel(level), `level ${levelClass(level)}`);
          appendEventCell(row, event.message || "");
          events.appendChild(row);
        });
      } catch (error) {
        setText("state", "失败");
        setText("packet", "无法读取 status.json");
        setText("phase", error.message);
        document.getElementById("state-dot").className = "dot fail";
      }
    }

    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>

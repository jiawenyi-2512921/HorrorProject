name: Test HorrorProject

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/test.yml'
      - 'HorrorProject/HorrorProject/Source/**'
      - 'HorrorProject/HorrorProject/Config/**'
      - 'HorrorProject/HorrorProject/Scripts/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  UE_ROOT: D:\UnrealEngine\UE_5.6
  PROJECT_ROOT: ${{ github.workspace }}\HorrorProject\HorrorProject

jobs:
  unit-tests:
    name: Automation Tests
    runs-on: [self-hosted, Windows, UE5.6]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Automation Tests
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File "$env:PROJECT_ROOT\Scripts\RunTests.ps1" `
            -Filter "HorrorProject"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: HorrorProject/HorrorProject/Saved/Automation/Reports/
          retention-days: 3

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: HorrorProject/HorrorProject/Saved/Logs/
          retention-days: 3

  quality-check:
    name: Code Quality
    runs-on: [self-hosted, Windows]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check Source Structure
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:PROJECT_ROOT "Source\HorrorProject"
          $issues = @()

          $files = Get-ChildItem -Path $sourceDir -Recurse -Include *.h,*.cpp
          foreach ($file in $files) {
            $firstLine = Get-Content $file.FullName -First 1
            if ($firstLine -notmatch "Copyright") {
              $issues += "Missing copyright: $($file.Name)"
            }
          }

          $headers = Get-ChildItem -Path $sourceDir -Recurse -Include *.h
          foreach ($header in $headers) {
            $content = Get-Content $header.FullName -Raw
            if ($content -match "UCLASS|USTRUCT|UENUM" -and $content -notmatch "\.generated\.h") {
              $issues += "Missing .generated.h: $($header.Name)"
            }
          }

          if ($issues.Count -gt 0) {
            Write-Warning "Quality issues found:"
            $issues | ForEach-Object { Write-Warning "  - $_" }
          }

      - name: Validate Build.cs Dependencies
        shell: pwsh
        run: |
          $buildCsPath = Join-Path $env:PROJECT_ROOT "Source\HorrorProject\HorrorProject.Build.cs"
          $buildCs = Get-Content $buildCsPath -Raw
          $requiredModules = @("Core", "CoreUObject", "Engine", "InputCore", "EnhancedInput")
          foreach ($module in $requiredModules) {
            if ($buildCs -notmatch "`"$module`"") {
              Write-Error "Missing required module dependency: $module"
              exit 1
            }
          }
          Write-Host "All required modules present in Build.cs"

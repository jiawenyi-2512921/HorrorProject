name: Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test Suite'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance

env:
  UE_VERSION: '5.6'
  PROJECT_NAME: 'HorrorProject'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'unit'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Unit Tests
      run: |
        & "${{ github.workspace }}\Scripts\Build\RunUnitTests.ps1" -GenerateReport

    - name: Generate Test Report
      if: always()
      run: |
        & "${{ github.workspace }}\Scripts\Build\GenerateTestReport.ps1" -Format "ALL"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results-${{ github.sha }}
        path: |
          Saved/Automation/
          Saved/Reports/TestReport_Unit_*
        retention-days: 30

    - name: Test Summary
      if: always()
      run: |
        echo "### Unit Test Results :test_tube:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY

        if (Test-Path "Saved/Reports/TestReport_Unit_*.txt") {
          $Report = Get-Content (Get-ChildItem "Saved/Reports/TestReport_Unit_*.txt" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName -Raw
          echo '```' >> $env:GITHUB_STEP_SUMMARY
          echo $Report >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
        }

  integration-tests:
    name: Integration Tests
    runs-on: windows-latest
    needs: unit-tests
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'integration'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Integration Tests
      run: |
        & "${{ github.workspace }}\Scripts\Build\RunIntegrationTests.ps1" -GenerateReport

    - name: Generate Test Report
      if: always()
      run: |
        & "${{ github.workspace }}\Scripts\Build\GenerateTestReport.ps1" -Format "ALL"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results-${{ github.sha }}
        path: |
          Saved/Automation/
          Saved/Reports/TestReport_Integration_*
        retention-days: 30

    - name: Test Summary
      if: always()
      run: |
        echo "### Integration Test Results :gear:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY

        if (Test-Path "Saved/Reports/TestReport_Integration_*.txt") {
          $Report = Get-Content (Get-ChildItem "Saved/Reports/TestReport_Integration_*.txt" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName -Raw
          echo '```' >> $env:GITHUB_STEP_SUMMARY
          echo $Report >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
        }

  all-tests:
    name: All Tests
    runs-on: windows-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.test_suite == 'all'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run All Tests
      run: |
        & "${{ github.workspace }}\Scripts\Build\RunAllTests.ps1" -GenerateReport -Parallel

    - name: Generate Comprehensive Report
      if: always()
      run: |
        & "${{ github.workspace }}\Scripts\Build\GenerateTestReport.ps1" -Format "ALL"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: all-test-results-${{ github.sha }}
        path: |
          Saved/Automation/
          Saved/Reports/TestReport_*
        retention-days: 30

    - name: Publish Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-html-${{ github.sha }}
        path: Saved/Reports/*.html
        retention-days: 90

  performance-tests:
    name: Performance Benchmark
    runs-on: windows-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.test_suite == 'performance'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Start Performance Monitor
      run: |
        Start-Job -ScriptBlock {
          & "${{ github.workspace }}\Scripts\Build\PerformanceMonitor.ps1" `
            -Duration 3600 `
            -OutputFormat "JSON"
        }

    - name: Run Performance Tests
      run: |
        & "${{ github.workspace }}\Scripts\Performance\RunPerformanceTests.ps1"

    - name: Stop Performance Monitor
      run: |
        Get-Job | Stop-Job
        Get-Job | Remove-Job

    - name: Upload Performance Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-results-${{ github.sha }}
        path: |
          PerformanceReports/
          Saved/Reports/PerformanceMonitor_*
        retention-days: 90

    - name: Performance Summary
      if: always()
      run: |
        echo "### Performance Test Results :chart_with_upwards_trend:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "Performance benchmark completed" >> $env:GITHUB_STEP_SUMMARY

  test-summary:
    name: Test Summary
    runs-on: windows-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
    - name: Generate Summary
      run: |
        echo "### Complete Test Results :clipboard:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $env:GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $env:GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $env:GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY

        $OverallStatus = "success"
        if ("${{ needs.unit-tests.result }}" -eq "failure" -or "${{ needs.integration-tests.result }}" -eq "failure") {
          $OverallStatus = "failure"
          echo "::error::One or more test suites failed"
        }

        echo "**Overall Status:** $OverallStatus" >> $env:GITHUB_STEP_SUMMARY

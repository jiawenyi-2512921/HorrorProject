name: Package Horror Project

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      config:
        description: 'Build Configuration'
        required: true
        default: 'Shipping'
        type: choice
        options:
          - Development
          - Shipping

env:
  UE_VERSION: '5.6'
  PROJECT_NAME: 'HorrorProject'

jobs:
  package:
    name: Package ${{ github.event.inputs.config || 'Shipping' }}
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive

    - name: Setup Build Environment
      run: |
        echo "Preparing build environment..."
        New-Item -ItemType Directory -Path "${{ github.workspace }}\Packaged" -Force

    - name: Package Project
      run: |
        $Config = "${{ github.event.inputs.config }}"
        if (-not $Config) { $Config = "Shipping" }

        & "C:\Program Files\Epic Games\UE_${{ env.UE_VERSION }}\Engine\Build\BatchFiles\RunUAT.bat" `
          BuildCookRun `
          -project="${{ github.workspace }}\${{ env.PROJECT_NAME }}.uproject" `
          -platform=Win64 `
          -clientconfig=$Config `
          -cook -stage -pak -archive `
          -archivedirectory="${{ github.workspace }}\Packaged" `
          -build -compressed -utf8output

    - name: Create Release Archive
      run: |
        $Version = "${{ github.ref_name }}"
        if (-not $Version) { $Version = "latest" }

        Compress-Archive -Path "${{ github.workspace }}\Packaged\*" `
          -DestinationPath "${{ github.workspace }}\HorrorProject-$Version-Win64.zip"

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: HorrorProject-Package
        path: HorrorProject-*.zip
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: HorrorProject-*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Package Summary
      run: |
        echo "### Package Results :package:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Configuration:** ${{ github.event.inputs.config || 'Shipping' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platform:** Win64" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ github.ref_name || 'latest' }}" >> $GITHUB_STEP_SUMMARY

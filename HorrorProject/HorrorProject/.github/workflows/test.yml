name: Test Horror Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily
  workflow_dispatch:

env:
  UE_VERSION: '5.6'
  PROJECT_NAME: 'HorrorProject'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Unit Tests
      run: |
        & "C:\Program Files\Epic Games\UE_${{ env.UE_VERSION }}\Engine\Binaries\Win64\UnrealEditor-Cmd.exe" `
          "${{ github.workspace }}\${{ env.PROJECT_NAME }}.uproject" `
          -ExecCmds="Automation RunTests Unit" `
          -TestExit="Automation Test Queue Empty" `
          -unattended -nopause -nosplash -nullrhi

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: Saved/Automation/
        retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: windows-latest
    needs: unit-tests

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Integration Tests
      run: |
        & "C:\Program Files\Epic Games\UE_${{ env.UE_VERSION }}\Engine\Binaries\Win64\UnrealEditor-Cmd.exe" `
          "${{ github.workspace }}\${{ env.PROJECT_NAME }}.uproject" `
          -ExecCmds="Automation RunTests Integration" `
          -TestExit="Automation Test Queue Empty" `
          -unattended -nopause -nosplash

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: Saved/Automation/
        retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: windows-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Performance Tests
      run: |
        & "${{ github.workspace }}\Scripts\Performance\RunPerformanceTests.ps1"

    - name: Upload Performance Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-test-results
        path: PerformanceReports/
        retention-days: 90

  test-summary:
    name: Test Summary
    runs-on: windows-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
    - name: Generate Summary
      run: |
        echo "### Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Unit Tests:** ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Integration Tests:** ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY

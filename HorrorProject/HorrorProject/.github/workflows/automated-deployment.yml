name: Automated Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version Tag'
        required: true
        type: string

env:
  UE_VERSION: '5.6'
  PROJECT_NAME: 'HorrorProject'

jobs:
  build-release:
    name: Build Release Package
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Extract Version
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $Version = "${{ github.ref }}" -replace 'refs/tags/', ''
        } else {
          $Version = "${{ github.event.inputs.version }}"
        }
        echo "version=$Version" >> $env:GITHUB_OUTPUT
        echo "Version: $Version" >> $env:GITHUB_STEP_SUMMARY

    - name: Build Shipping Package
      run: |
        & "${{ github.workspace }}\Scripts\Build\BuildShipping.ps1" `
          -Platform Win64 `
          -Parallel `
          -Archive

    - name: Package with Assets
      run: |
        & "${{ github.workspace }}\Scripts\Build\PackageWithAssets.ps1" `
          -Configuration Shipping `
          -CompressAssets

    - name: Create Optimized Package
      run: |
        & "${{ github.workspace }}\Scripts\Build\PackageOptimized.ps1" `
          -Platform Win64 `
          -OptimizationLevel Maximum

    - name: Generate Release Notes
      run: |
        $Version = "${{ steps.version.outputs.version }}"
        $ReleaseNotes = @"
# HorrorProject $Version

## Build Information
- **Version:** $Version
- **Build Date:** $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
- **Commit:** ${{ github.sha }}
- **Configuration:** Shipping
- **Platform:** Win64

## Changes
$(git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD)

## Package Details
- Optimized for maximum performance
- Compressed assets included
- Full game content

"@

        Set-Content -Path "RELEASE_NOTES.md" -Value $ReleaseNotes

        echo "### Release Notes :rocket:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo $ReleaseNotes >> $env:GITHUB_STEP_SUMMARY

    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: release-package-${{ steps.version.outputs.version }}
        path: |
          Saved/Packages/Optimized_*
          Saved/StagedBuilds/Shipping_*
          RELEASE_NOTES.md
        retention-days: 90
        compression-level: 9

    - name: Upload Build Reports
      uses: actions/upload-artifact@v4
      with:
        name: release-reports-${{ steps.version.outputs.version }}
        path: Saved/Reports/
        retention-days: 90

  deploy-staging:
    name: Deploy to Staging
    runs-on: windows-latest
    needs: build-release
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.horrorproject.example.com

    steps:
    - name: Download Release Package
      uses: actions/download-artifact@v4
      with:
        name: release-package-${{ needs.build-release.outputs.version }}

    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment..."
        echo "### Staging Deployment :package:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Status:** Deployed" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Environment:** Staging" >> $env:GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to Production
    runs-on: windows-latest
    needs: build-release
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://horrorproject.example.com

    steps:
    - name: Download Release Package
      uses: actions/download-artifact@v4
      with:
        name: release-package-${{ needs.build-release.outputs.version }}

    - name: Deploy to Production
      run: |
        echo "Deploying to production environment..."
        echo "### Production Deployment :rocket:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Status:** Deployed" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Environment:** Production" >> $env:GITHUB_STEP_SUMMARY

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        files: |
          Saved/Packages/Optimized_*/*.zip
          RELEASE_NOTES.md
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

  notify-deployment:
    name: Deployment Notification
    runs-on: windows-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
    - name: Send Notification
      run: |
        echo "Deployment completed"
        echo "### Deployment Summary :bell:" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "All deployment tasks completed" >> $env:GITHUB_STEP_SUMMARY
